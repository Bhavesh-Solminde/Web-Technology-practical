<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Basic Quiz</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="quiz-wrap">
		<h1>Quick Quiz</h1>
		<p class="intro">A very basic quiz with a couple of jokes (yes, one answer is "67").</p>

		<section id="quiz" aria-live="polite">
			<div id="question-area">
				<h2 id="question"></h2>
			</div>
			<ul id="choices" class="choices"></ul>
			<div class="controls">
				<button id="nextBtn">Next</button>
			</div>
			<div id="result" class="result" hidden></div>
		</section>
	</main>

	<script src="script.js"></script>
</body>
</html>
