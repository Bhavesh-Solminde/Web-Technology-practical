<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Practice</title>
</head>
<body>

<h1>Welcome</h1>
<h1>SE</h1>

<script>
    console.log("Hello World");

    // Numbers
    let a = 10;
    let b = 20;

    console.log("Value of a:", a);

    // Strings
    let str1 = "This is a string";
    let str2 = "This is one more string";
    console.log(str1, str2);

    // Object
    let marks = {
        yogesh: 90,
        mahesh: 80,
        ramesh: 75
    };
    console.log(marks);

    // Boolean
    let isStudent = false;
    console.log(isStudent);

    // Array
    let arr = [1, 2, 3, 4, 5];
    console.log(arr);

    // Arithmetic Operators
    console.log("Addition:", a + b);
    console.log("Subtraction:", a - b);
    console.log("Multiplication:", a * b);
    console.log("Division:", a / b);

    // Function
    function avg(x, y) {
        return (x + y) / 2;
    }

    console.log("Average:", avg(a, b));

    // If-Else
    let age = 9;

    if (age <= 20) {
        console.log("You are a child");
    } else {
        console.log("You are an adult");
    }

    // While Loop
    let j = 0;
    while (j < arr.length) {
        console.log("Array value:", arr[j]);
        j++;
    }

</script>

</body>
</html>
